<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YouTube Dashboard</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b1220;
    color:#e5e7eb;
    display:flex;
    justify-content:center;
    padding:16px;
}

.container{
    width:100%;
    max-width:520px;
}

.card{
    background:#111827;
    border:1px solid #1f2937;
    border-radius:16px;
    padding:14px;
    margin-bottom:12px;
}

h1{
    font-size:18px;
    margin:0 0 10px 0;
}

input, button{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #374151;
    margin-top:8px;
    font-size:14px;
}

input{
    background:#0b1220;
    color:white;
    outline:none;
}

button{
    background:#38bdf8;
    border:none;
    font-weight:600;
    cursor:pointer;
}

.channel-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px;
    border:1px solid #1f2937;
    border-radius:10px;
    margin-top:6px;
    background:#0b1220;
}

.small{
    font-size:12px;
    color:#94a3b8;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.box{
    background:#0b1220;
    border:1px solid #1f2937;
    border-radius:12px;
    padding:10px;
}

.big{
    font-size:24px;
    color:#38bdf8;
    font-weight:700;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>📊 YouTube Dashboard</h1>

<input id="channelInput" placeholder="@channel або ID">
<button onclick="addChannel()">➕ Додати канал</button>
</div>

<div class="card">
<h1>📌 Канали</h1>
<div id="channels"></div>
</div>

<div class="card">
<h1 id="title">Завантаження...</h1>

<div class="grid">

<div class="box">
<div class="small">Підписники</div>
<div id="subs" class="big">-</div>
</div>

<div class="box">
<div class="small">Вік</div>
<div id="daysOld">-</div>
</div>

<div class="box">
<div class="small">Ріст/день</div>
<div id="avg">-</div>
</div>

<div class="box">
<div class="small">До цілі</div>
<div id="remaining">-</div>
</div>

</div>
</div>

</div>

<script>

const API = "https://youtube-stats-api.oleh-strilets.workers.dev";
const GOAL = 1000;

let channels = [];

function loadStorage(){
    const saved = localStorage.getItem("yt_channels");

    if(saved){
        channels = JSON.parse(saved);
    } else {
        // ⭐ ДЕФОЛТНИЙ КАНАЛ
        channels = ["@BaarenSecrets"];
        saveStorage();
    }
}

function saveStorage(){
    localStorage.setItem("yt_channels", JSON.stringify(channels));
}

function renderChannels(){
    const el = document.getElementById("channels");
    el.innerHTML = "";

    channels.forEach(ch => {

        const div = document.createElement("div");
        div.className = "channel-item";

        div.innerHTML = `
            <span>${ch}</span>
            <button onclick="loadChannel('${ch}')">Відкрити</button>
        `;

        el.appendChild(div);
    });
}

function addChannel(){
    const input = document.getElementById("channelInput");
    const value = input.value.trim();

    if(!value) return;

    if(!channels.includes(value)){
        channels.push(value);
        saveStorage();
        renderChannels();
    }

    input.value = "";
}

async function loadChannel(handle){

    const res = await fetch(`${API}?handle=${encodeURIComponent(handle)}`);
    const data = await res.json();

    if(data.error){
        alert(data.error);
        return;
    }

    document.getElementById("title").textContent = data.title;

    document.getElementById("subs").textContent =
        data.subscribers.toLocaleString();

    const created = new Date(data.createdAt);
    const now = new Date();

    const days = Math.floor((now-created)/(1000*60*60*24));
    document.getElementById("daysOld").textContent = days;

    const avg = data.subscribers / days;
    document.getElementById("avg").textContent = avg.toFixed(2);

    let remaining = 0;

    if(data.subscribers < GOAL && avg > 0){
        remaining = Math.ceil((GOAL - data.subscribers)/avg);
    }

    document.getElementById("remaining").textContent = remaining;
}

// INIT
loadStorage();
renderChannels();
loadChannel(channels[0]);

</script>

</body>
</html>
