<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YouTube Dashboard</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b1220;
    color:#e5e7eb;
    display:flex;
    justify-content:center;
    padding:16px;
}

.container{
    width:100%;
    max-width:520px;
}

.card{
    background:#111827;
    border:1px solid #1f2937;
    border-radius:16px;
    padding:14px;
    margin-bottom:12px;
}

h1{
    font-size:18px;
    margin:0 0 10px 0;
}

input, select, button{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #374151;
    margin-top:8px;
    font-size:14px;
    box-sizing:border-box;
}

input, select{
    background:#0b1220;
    color:white;
    outline:none;
}

button{
    background:#38bdf8;
    border:none;
    font-weight:600;
    cursor:pointer;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.box{
    background:#0b1220;
    border:1px solid #1f2937;
    border-radius:12px;
    padding:10px;
}

.big{
    font-size:24px;
    color:#38bdf8;
    font-weight:700;
}

.small{
    font-size:12px;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="container">

<!-- ДОДАВАННЯ КАНАЛУ -->
<div class="card">
<h1>➕ Додати канал</h1>

<input id="channelInput" placeholder="@channel або ID">
<button onclick="addChannel()">Додати</button>
</div>

<!-- ВИБІР КАНАЛУ -->
<div class="card">
<h1>📌 Канал</h1>

<select id="channelSelect" onchange="onChannelChange()"></select>

<input id="goalInput" type="number" value="1000" placeholder="Ціль підписників" oninput="updateStats()">
</div>

<!-- СТАТИСТИКА -->
<div class="card">
<h1 id="title">Завантаження...</h1>

<div class="grid">

<div class="box">
<div class="small">Підписники</div>
<div id="subs" class="big">-</div>
</div>

<div class="box">
<div class="small">Вік каналу</div>
<div id="daysOld">-</div>
</div>

<div class="box">
<div class="small">Ріст / день</div>
<div id="avg">-</div>
</div>

<div class="box">
<div class="small">До цілі</div>
<div id="remaining">-</div>
</div>

<div class="box" style="grid-column:span 2;">
<div class="small">📅 Дата досягнення</div>
<div id="date">-</div>
</div>

</div>

</div>

</div>

<script>

const API = "https://youtube-stats-api.oleh-strilets.workers.dev";

let channels = [];
let currentData = null;

function loadStorage(){
    const saved = localStorage.getItem("yt_channels");

    if(saved){
        channels = JSON.parse(saved);
    } else {
        channels = ["@BaarenSecrets"];
        saveStorage();
    }
}

function saveStorage(){
    localStorage.setItem("yt_channels", JSON.stringify(channels));
}

function renderSelect(){

    const select = document.getElementById("channelSelect");
    select.innerHTML = "";

    channels.forEach(ch => {
        const opt = document.createElement("option");
        opt.value = ch;
        opt.textContent = ch;
        select.appendChild(opt);
    });
}

function addChannel(){
    const input = document.getElementById("channelInput");
    const val = input.value.trim();

    if(!val) return;

    if(!channels.includes(val)){
        channels.push(val);
        saveStorage();
        renderSelect();
    }

    input.value = "";
}

function onChannelChange(){
    const ch = document.getElementById("channelSelect").value;
    loadChannel(ch);
}

async function loadChannel(handle){

    const res = await fetch(`${API}?handle=${encodeURIComponent(handle)}`);
    const data = await res.json();

    if(data.error){
        alert(data.error);
        return;
    }

    currentData = data;

    document.getElementById("title").textContent = data.title;

    updateStats();
}

function updateStats(){

    if(!currentData) return;

    const goal = Number(document.getElementById("goalInput").value || 1000);

    const subs = currentData.subscribers;
    const created = new Date(currentData.createdAt);
    const now = new Date();

    const days = Math.floor((now-created)/(1000*60*60*24));

    const avg = subs / days;

    document.getElementById("subs").textContent = subs.toLocaleString();
    document.getElementById("daysOld").textContent = days;
    document.getElementById("avg").textContent = avg.toFixed(2);

    let remaining = 0;

    if(subs < goal && avg > 0){
        remaining = Math.ceil((goal - subs) / avg);
        document.getElementById("remaining").textContent = remaining + " днів";
    } else {
        document.getElementById("remaining").textContent = "Досягнуто";
    }

    const targetDate = new Date();
    targetDate.setDate(targetDate.getDate() + remaining);

    document.getElementById("date").textContent =
        targetDate.toLocaleDateString("uk-UA", {
            year:"numeric",
            month:"long",
            day:"numeric"
        });
}

// INIT
loadStorage();
renderSelect();
loadChannel(channels[0]);

</script>

</body>
</html>
