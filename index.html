<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YouTube Tracker</title>

<style>
body{
    margin:0;
    font-family: system-ui, Arial;
    background:#0b1220;
    color:#e5e7eb;
    display:flex;
    justify-content:center;
    padding:16px;
}

.container{
    width:100%;
    max-width:520px;
}

.card{
    background:#111827;
    border:1px solid #1f2937;
    border-radius:16px;
    padding:16px;
    margin-top:12px;
}

h1{
    font-size:18px;
    margin:0 0 12px 0;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #374151;
    background:#0b1220;
    color:white;
    margin-bottom:10px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:0;
    border-radius:10px;
    background:#38bdf8;
    color:black;
    font-weight:600;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:12px;
}

.box{
    background:#0b1220;
    border:1px solid #1f2937;
    border-radius:12px;
    padding:10px;
}

.label{
    font-size:12px;
    color:#94a3b8;
}

.value{
    font-size:16px;
    font-weight:600;
    margin-top:4px;
}

.big{
    font-size:26px;
    color:#38bdf8;
}

</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>📊 YouTube Goal Tracker</h1>

<input id="handle" placeholder="@channel або Channel ID">
<input id="goal" type="number" placeholder="Ціль (наприклад 1000)" value="1000">

<button onclick="loadData()">Оновити</button>
</div>

<div class="card">
<h1 id="title">Введіть канал</h1>

<div class="grid">

<div class="box">
<div class="label">Підписники</div>
<div id="subs" class="value big">-</div>
</div>

<div class="box">
<div class="label">Вік</div>
<div id="daysOld" class="value">-</div>
</div>

<div class="box">
<div class="label">Ріст / день</div>
<div id="avg" class="value">-</div>
</div>

<div class="box">
<div class="label">До цілі</div>
<div id="remaining" class="value">-</div>
</div>

<div class="box" style="grid-column:span 2;">
<div class="label">📅 Дата досягнення</div>
<div id="date" class="value">-</div>
</div>

</div>

</div>

</div>

<script>

const API = "https://youtube-stats-api.oleh-strilets.workers.dev";

async function loadData(){

    const handle = document.getElementById("handle").value;
    const goal = Number(document.getElementById("goal").value || 1000);

    const url = `${API}?handle=${encodeURIComponent(handle)}`;

    const res = await fetch(url);
    const data = await res.json();

    if(data.error){
        alert(data.error);
        return;
    }

    document.getElementById("title").textContent = data.title;
    document.getElementById("subs").textContent = data.subscribers.toLocaleString();

    const created = new Date(data.createdAt);
    const now = new Date();

    const days = Math.floor((now - created)/(1000*60*60*24));
    document.getElementById("daysOld").textContent = days;

    const avg = data.subscribers / days;
    document.getElementById("avg").textContent = avg.toFixed(2);

    let remaining = 0;

    if(data.subscribers < goal && avg > 0){
        remaining = Math.ceil((goal - data.subscribers) / avg);
    }

    document.getElementById("remaining").textContent = remaining;

    const target = new Date();
    target.setDate(target.getDate() + remaining);

    document.getElementById("date").textContent =
        target.toLocaleDateString("uk-UA", {
            year:"numeric",
            month:"long",
            day:"numeric"
        });
}

</script>

</body>
</html>
