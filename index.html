<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YouTube Goal Tracker</title>

<style>
body{
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background:#0f172a;
    color:#e2e8f0;
    margin:0;
    display:flex;
    justify-content:center;
    padding:40px 15px;
}

.card{
    width:100%;
    max-width:720px;
    background:#111827;
    border:1px solid #1f2937;
    border-radius:16px;
    padding:24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h1{
    margin:0 0 20px 0;
    font-size:22px;
    color:#f8fafc;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
}

.box{
    background:#0b1220;
    border:1px solid #1f2937;
    border-radius:12px;
    padding:14px;
}

.label{
    font-size:13px;
    color:#94a3b8;
}

.value{
    font-size:20px;
    font-weight:600;
    margin-top:6px;
    color:#e2e8f0;
}

.big{
    font-size:34px;
    font-weight:800;
    color:#38bdf8;
}

.highlight{
    color:#22c55e;
}

.warning{
    color:#f59e0b;
}
</style>
</head>

<body>

<div class="card">

<h1 id="channelName">Завантаження...</h1>

<div class="grid">

    <div class="box">
        <div class="label">Підписники</div>
        <div id="subs" class="value big">-</div>
    </div>

    <div class="box">
        <div class="label">Дата створення</div>
        <div id="created" class="value">-</div>
    </div>

    <div class="box">
        <div class="label">Вік каналу</div>
        <div id="daysOld" class="value">-</div>
    </div>

    <div class="box">
        <div class="label">Середній приріст</div>
        <div id="avg" class="value">-</div>
    </div>

    <div class="box">
        <div class="label">До 1000 підписників</div>
        <div id="remaining" class="value warning">-</div>
    </div>

    <div class="box">
        <div class="label">📅 Прогноз до 1000</div>
        <div id="targetDate" class="value highlight">-</div>
    </div>

</div>

</div>

<script>

const CHANNEL_ID = "UCOIAIj_CYaYzMHBR4L9OMFA";
const API_URL = "https://youtube-stats-api.oleh-strilets.workers.dev";
const GOAL = 1000;

async function loadData(){

    const res = await fetch(`${API_URL}?channelId=${CHANNEL_ID}`);
    const data = await res.json();

    // Назва
    document.getElementById("channelName").textContent =
        data.title;

    // Підписники
    document.getElementById("subs").textContent =
        data.subscribers.toLocaleString();

    // Дата створення
    const createdDate = new Date(data.createdAt);
    document.getElementById("created").textContent =
        createdDate.toLocaleDateString("uk-UA");

    // Вік каналу
    const now = new Date();
    const daysOld = Math.floor((now - createdDate) / (1000*60*60*24));
    document.getElementById("daysOld").textContent = daysOld;

    // Середній ріст
    const avgGrowth = data.subscribers / daysOld;
    document.getElementById("avg").textContent =
        avgGrowth.toFixed(2) + " / день";

    // До цілі
    let remainingDays = 0;

    if(data.subscribers < GOAL && avgGrowth > 0){
        remainingDays = Math.ceil((GOAL - data.subscribers) / avgGrowth);
        document.getElementById("remaining").textContent =
            remainingDays + " днів";
    } else {
        document.getElementById("remaining").textContent = "Досягнуто!";
    }

    // 📅 ДАТА ДОСЯГНЕННЯ ЦІЛІ
    if(avgGrowth > 0){

        const targetDate = new Date();
        targetDate.setDate(targetDate.getDate() + remainingDays);

        document.getElementById("targetDate").textContent =
            targetDate.toLocaleDateString("uk-UA", {
                year: "numeric",
                month: "long",
                day: "numeric"
            });

    } else {
        document.getElementById("targetDate").textContent =
            "Недостатньо даних";
    }
}

loadData();

</script>

</body>
</html>
