<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YouTube Dashboard</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b1220;
    color:#e5e7eb;
    display:flex;
    justify-content:center;
    padding:14px;
}

.container{
    width:100%;
    max-width:560px;
}

/* TOP BAR */
.topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#111827;
    border:1px solid #1f2937;
    border-radius:16px;
    padding:12px;
    position:relative;
}

.left{
    display:flex;
    gap:10px;
    align-items:center;
}

.avatar{
    width:48px;
    height:48px;
    border-radius:50%;
    object-fit:cover;
    background:#1f2937;
}

.title{
    font-weight:700;
}

.subtext{
    font-size:12px;
    color:#94a3b8;
}

.menu-btn{
    font-size:22px;
    cursor:pointer;
    padding:6px 10px;
}

/* MENU */
.menu{
    position:absolute;
    right:10px;
    top:60px;
    background:#111827;
    border:1px solid #1f2937;
    border-radius:12px;
    width:180px;
    display:none;
    z-index:10;
}

.menu button{
    width:100%;
    padding:10px;
    background:none;
    border:none;
    color:white;
    text-align:left;
    cursor:pointer;
}

.menu button:hover{
    background:#0b1220;
}

/* CARDS */
.card{
    margin-top:12px;
    background:#111827;
    border:1px solid #1f2937;
    border-radius:16px;
    padding:12px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.box{
    background:#0b1220;
    border:1px solid #1f2937;
    border-radius:12px;
    padding:10px;
}

.small{
    font-size:12px;
    color:#94a3b8;
}

.big{
    font-size:20px;
    font-weight:700;
    color:#38bdf8;
}

/* BUTTONS */
button{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    margin-top:10px;
    background:#38bdf8;
    font-weight:700;
    cursor:pointer;
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:center;
    justify-content:center;
}

.modal-content{
    background:#111827;
    padding:16px;
    border-radius:14px;
    width:90%;
    max-width:360px;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:10px;
    border:1px solid #1f2937;
    background:#0b1220;
    color:white;
}

.goal-option{
    display:flex;
    align-items:center;
    gap:10px;
    margin:8px 0;
    cursor:pointer;
}

.goal-option input{
    width:auto;
    margin:0;
}
</style>
</head>

<body>

<div class="container">

<!-- TOPBAR -->
<div class="topbar">

<div class="left">
<img id="avatar" class="avatar">

<div>
<div class="title" id="title">Завантаження...</div>
<div class="subtext">
<span id="subs">-</span> •
<span id="created">-</span>
</div>
</div>
</div>

<div class="menu-btn" onclick="toggleMenu()">⋮</div>

<div class="menu" id="menu">
<button onclick="openAdd()">➕ Додати канал</button>
<button onclick="openSwitch()">🔄 Змінити канал</button>
</div>

</div>

<!-- STATISTICS -->
<div class="card" id="statsBlock">

<div class="grid">
<div class="box">
<div class="small">Вік каналу</div>
<div id="daysOld" class="big">-</div>
</div>

<div class="box">
<div class="small">Ріст / день</div>
<div id="avg" class="big">-</div>
</div>
</div>

<div class="card">
<div class="box goal-box">

    <div class="small">Ціль</div>

    <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
    ">

        <div id="goalValue" class="big">
            -
        </div>

        <button
            id="goalEditBtn"
            onclick="openGoalSelector()"
            style="
                width:40px;
                height:40px;
                margin:0;
                padding:0;
            "
        >
            ✏️
        </button>

    </div>

</div>
</div>

<div class="grid">
<div class="box">
<div class="small">До цілі</div>
<div id="remaining" class="big">-</div>
</div>

<div class="box">
<div class="small">Дата досягнення</div>
<div id="date" class="big">-</div>
</div>
</div>

<button onclick="toggleDetails()">📊 Детальна статистика</button>

</div>

<!-- DETAIL -->
<div class="card" id="detailBlock" style="display:none;">
<h3>📊 Детальна статистика</h3>
<p>Тут буде наступний рівень аналітики</p>
<button onclick="toggleDetails()">⬅ Назад</button>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    
    <div id="modalHeader"></div>
    
    <div id="modalBody"></div>

  </div>
</div>

</div>

<script>

const API = "https://youtube-stats-api.oleh-strilets.workers.dev";

const MILESTONES = [
    100,
    500,
    1000,
    5000,
    10000,
    50000,
    100000,
    250000,
    500000,
    1000000
];

let channels = [];
let current = null;
let mode = "add";
let activeChannel = null;
    
/* INIT */
load();

function load(){

    const saved = localStorage.getItem("yt_channels");

    if(saved){
        channels = JSON.parse(saved);
    } else {
        channels = ["@BaarenSecrets"];
        save();
    }

    const savedActive = localStorage.getItem("yt_active_channel");
    activeChannel = savedActive || channels[0];

    loadChannel(activeChannel);
}

/* STORAGE */
function save(){
    localStorage.setItem("yt_channels", JSON.stringify(channels));
}

/* MENU */
function toggleMenu(){
    const m = document.getElementById("menu");
    m.style.display = m.style.display === "block" ? "none" : "block";
}

/* MODAL */
function openAdd(){

    closeMenu();
    mode = "add";

    document.getElementById("modalHeader").textContent = "Додати канал";

    document.getElementById("modalBody").innerHTML = `
        <input id="channelInput" placeholder="@handle">

        <button onclick="saveChannel()">Зберегти</button>
        <button onclick="closeModal()" style="background:#1f2937;">
            Скасувати
        </button>
    `;

    document.getElementById("modal").style.display = "flex";
}

function openSwitch(){

    closeMenu();
    mode = "switch";

    document.getElementById("modalHeader").textContent = "Змінити канал";

    const list = channels.map(ch => `
        <button onclick="selectChannel('${ch}')"
            style="width:100%;padding:10px;margin:5px 0;border-radius:10px;background:#0b1220;color:white;border:1px solid #1f2937;">
            ${ch}
        </button>
    `).join("");

    document.getElementById("modalBody").innerHTML = `
        <div style="max-height:260px;overflow-y:auto;display:flex;flex-direction:column;">
            ${list}
        </div>

        <button onclick="openAdd()">➕ Додати канал</button>
        <button onclick="closeModal()">Закрити</button>
    `;

    document.getElementById("modal").style.display = "flex";
}
    
function closeMenu(){
    document.getElementById("menu").style.display = "none";
}

function selectChannel(ch){
    switchToChannel(ch);
}

function buildSelect(){
    let options = channels.map(c => `<option value="${c}">${c}</option>`).join("");
    return `<select id="channelInput">${options}</select>`;
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

/* SAVE CHANNEL */
function saveChannel(){

    const val = document.getElementById("channelInput").value.trim();

    if(!val) return;

    if(mode === "add"){

        if(!channels.includes(val)){
            channels.push(val);
            save();
        }

        // ⭐ ВАЖЛИВО: робимо його активним
        switchToChannel(val);

    } else {
        switchToChannel(val);
    }
}
    
/* LOAD CHANNEL */
async function loadChannel(handle){

    const res = await fetch(`${API}?handle=${encodeURIComponent(handle)}`);
    const data = await res.json();

    current = data;

    document.getElementById("title").textContent = data.title;
    document.getElementById("subs").textContent = data.subscribers.toLocaleString() + subsCase(data.subscribers);

    const created = new Date(data.createdAt);
    document.getElementById("created").textContent =
        created.toLocaleDateString("uk-UA");

    const avatar =
    data.thumbnails?.high?.url ||
    data.thumbnails?.medium?.url ||
    data.thumbnails?.default?.url ||
    "";
    document.getElementById("avatar").src = avatar;

    updateGoalUI();
    updateStats();
}

function switchToChannel(ch){
    setActiveChannel(ch);
    closeModal();
    loadChannel(ch);
}

/* STATS */

function updateGoalUI(){

    const goal = getCurrentGoal();

    document.getElementById("goalValue")
        .textContent = goal.toLocaleString();

    const settings = getGoalSettings();

    const custom =
        settings[activeChannel];

    document
        .getElementById("goalEditBtn")
        .style.background =
            custom ? "#ffffff" : "";
}
    
function getGoalSettings() {
    return JSON.parse(
        localStorage.getItem("yt_goal_settings") || "{}"
    );
}

function saveGoalSettings(settings) {
    localStorage.setItem(
        "yt_goal_settings",
        JSON.stringify(settings)
    );
}

function getDefaultGoal(subscribers){

    for(const goal of MILESTONES){
        if(subscribers < goal){
            return goal;
        }
    }

    return MILESTONES[MILESTONES.length - 1];
}

function getCurrentGoal(){

    if(!current || !activeChannel){
        return 1000;
    }

    const settings = getGoalSettings();

    if(settings[activeChannel]){
        return settings[activeChannel].value;
    }

    return getDefaultGoal(current.subscribers);
}

function openGoalSelector(){

    closeMenu();
    const currentGoal = getCurrentGoal();
    const settings = getGoalSettings();
    const isCustom = settings[activeChannel]?.type === "custom";
    const subscribers = current.subscribers;

    let html = "";

    for(const goal of MILESTONES){

        if(goal <= subscribers){
            continue;
        }
        
        html += `
        <label class="goal-option">
        
            <input
                type="radio"
                name="goal"
                value="${goal}"
                ${goal === currentGoal ? "checked" : ""}
            >
        
            <span>${goal.toLocaleString()}</span>
        
        </label>
        `;
    }

    html += `
    <hr>

    <label  class="goal-option">
        <input
            id="customGoalRadio"
            type="radio"
            name="goal"
            value="custom"
            ${isCustom ? "checked" : ""}
        >
        Власна ціль
    </label>

    <input
        id="customGoal"
        inputmode="numeric"
        pattern="[0-9]*"
        placeholder="Введіть число"
        value="${isCustom ? currentGoal : "">
    `;

    html += `
    <button onclick="saveGoalSelection()">
        Зберегти
    </button>
    `;


    
    document.getElementById("modalHeader")
        .textContent = "Вибір цілі";

    document.getElementById("modalBody")
        .innerHTML = html;

    document.getElementById("modal")
        .style.display = "flex";
    
    setTimeout(() => {

        const input =
            document.getElementById("customGoal");
    
        if(!input) return;
    
        input.addEventListener("input", () => {
    
            input.value =
                input.value.replace(/\D/g, "");
    
        });
    
    }, 0);
    setTimeout(() => {

        const input =
            document.getElementById("customGoal");
    
        const radio =
            document.getElementById("customGoalRadio");
    
        if(!input || !radio) return;
    
        input.addEventListener("input", () => {
    
            input.value =
                input.value.replace(/\D/g, "");
    
            if(input.value.length > 0){
                radio.checked = true;
            }
    
        });
    
    }, 0);
}

function saveGoalSelection(){

    const selected =
        document.querySelector(
            'input[name="goal"]:checked'
        );

    const settings =
        getGoalSettings();

    if(!selected){

        delete settings[activeChannel];

    } else if(selected.value === "custom"){

        const custom =
            Number(
                document.getElementById("customGoal").value
            );

        if(custom > 0){

            settings[activeChannel] = {
                type:"custom",
                value:custom
            };
        }

    } else {

        settings[activeChannel] = {
            type:"milestone",
            value:Number(selected.value)
        };
    }

    saveGoalSettings(settings);

    updateGoalUI();
    updateStats();
    closeModal();
}
    
function updateStats(){

    if(!current) return;

    const goal = getCurrentGoal();
    const now = new Date();
    const created = new Date(current.createdAt);

    const days = Math.max(
        1,
        Math.floor((now-created)/(1000*60*60*24))
    );

    const avg = current.subscribers / days;

    document.getElementById("daysOld").textContent = days + daysCase(days);
    document.getElementById("avg").textContent = avg.toFixed(2);

    let remaining = 0;

    if(current.subscribers < goal && avg > 0){
        remaining = Math.ceil((goal - current.subscribers) / avg);
        document.getElementById("remaining").textContent = remaining + daysCase(remaining);
    } else {
        document.getElementById("remaining").textContent = "Досягнуто";
    }

    const date = new Date();
    date.setDate(date.getDate() + remaining);

    document.getElementById("date").textContent =
        date.toLocaleDateString("uk-UA", {
            year:"numeric",
            month:"long",
            day:"numeric"
        });
}

function daysCase(qty){
    const absNumber = Math.abs(qty);
    const lastTwoDigits = absNumber % 100;
    const lastDigit = absNumber % 10;

    // 1. Виняток для чисел, що закінчуються на 11-14
    if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
        return " днів";
    }

    // 2. Правило для останньої цифри
    if (lastDigit === 1) {
        return " день";
    }
    if (lastDigit >= 2 && lastDigit <= 4) {
        return " дні";
    }
    
    // Для всіх інших цифр (0, 5, 6, 7, 8, 9)
    return " днів";
}

function subsCase(qty){
    const absNumber = Math.abs(qty);
    const lastTwoDigits = absNumber % 100;
    const lastDigit = absNumber % 10;

    // 1. Виняток для чисел, що закінчуються на 11-14
    if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
        return " підписників";
    }

    // 2. Правило для останньої цифри
    if (lastDigit === 1) {
        return " підписник";
    }
    if (lastDigit >= 2 && lastDigit <= 4) {
        return " підписники";
    }
    
    // Для всіх інших цифр (0, 5, 6, 7, 8, 9)
    return " підписників";
}
    
/* DETAIL TOGGLE */
function toggleDetails(){
    const s = document.getElementById("statsBlock");
    const d = document.getElementById("detailBlock");

    if(d.style.display === "none"){
        s.style.display = "none";
        d.style.display = "block";
    } else {
        s.style.display = "block";
        d.style.display = "none";
    }
}

function setActiveChannel(ch){
    activeChannel = ch;
    localStorage.setItem("yt_active_channel", ch);
}

document.addEventListener("click", function(e){

    const menu = document.getElementById("menu");
    const btn = document.querySelector(".menu-btn");

    if(!menu || !btn) return;

    if(!menu.contains(e.target) && !btn.contains(e.target)){
        menu.style.display = "none";
    }
});
    
</script>

</body>
</html>
